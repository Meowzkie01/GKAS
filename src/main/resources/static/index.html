<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GKAS - Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(180deg, #0052cc 0%, #003399 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            color: #0052cc;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .tagline {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 35px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #333;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: #0052cc;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
            display: inline-block;
            text-align: center;
            text-decoration: none;
        }

        .btn-login {
            background-color: #0052cc;
            color: white;
            box-shadow: 0 4px 12px rgba(0, 82, 204, 0.3);
        }

        .btn-login:hover {
            background-color: #0041a3;
        }

        .divider {
            margin: 25px 0;
            position: relative;
            text-align: center;
        }

        .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background-color: #e0e0e0;
            z-index: 1;
        }

        .divider span {
            background-color: #ffffff;
            padding: 0 15px;
            color: #888;
            font-size: 0.85rem;
            position: relative;
            z-index: 2;
        }

        .btn-register {
            background-color: transparent;
            color: #0052cc;
            border: 2px solid #0052cc;
        }

        .btn-register:hover {
            background-color: rgba(0, 82, 204, 0.05);
        }

        .footer-links {
            margin-top: 25px;
            font-size: 0.8rem;
        }

        .footer-links a {
            color: #666;
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">GKAS</div>
        <div class="tagline">Your trusted digital wallet</div>

        <form onsubmit="loginUser(event)">
            <div class="input-group">
                <label for="username">Username or Mobile Number</label>
                <input type="text" id="username" placeholder="e.g., 0917XXXXXXX" required>
            </div>

            <div class="input-group">
                <label for="password">Password / MPIN</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-login">Log In</button>
        </form>

        <div class="divider">
            <span>New to GKAS?</span>
        </div>

        <a href="register.html" class="btn btn-register">Register an Account</a>

        <div class="footer-links">
            <a href="#">Forgot Password?</a>
        </div>
    </div>

    <script>
    function loginUser(event) {
        event.preventDefault();

        const inputIdentifier = document.getElementById("username").value.trim();
        const passwordInput = document.getElementById("password").value;

        // 1. Core default application accounts
        const defaultUsers = [
            {
                username: "09184540238",
                password: "1234",
                name: "Juan Dela Cruz",
                balance: 5000
            },
            {
                username: "09398875272",
                password: "5678",
                name: "Maria Santos",
                balance: 7500
            },
            {
                username: "admin",
                password: "admin123",
                name: "GKAS Administrator",
                balance: 100000
            }
        ];

        // 2. Fetch dynamically registered user profiles from browser storage
        const registeredUsers = JSON.parse(localStorage.getItem("gkasUsersList")) || [];

        // 3. Search default accounts first
        let user = defaultUsers.find(
            u => u.username === inputIdentifier && u.password === passwordInput
        );

        // 4. If not found, search through registered users list
        if (!user) {
            user = registeredUsers.find(
                u => (u.mobile === inputIdentifier || u.username === inputIdentifier) && u.password === passwordInput
            );
        }

        // 5. Authenticate session if matching data object resolves
        if (user) {
            localStorage.setItem("gkasUser", JSON.stringify(user));
            window.location.href = "dashboard.html";
        } else {
            alert("Invalid username or password.");
        }
    }
    </script>

</body>
</html>

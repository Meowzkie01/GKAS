<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GKAS - Account Created</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0052cc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .success-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 500px;
            border-radius: 28px;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .brand-logo {
            font-size: 2.2rem;
            font-weight: 800;
            color: #0052cc;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
        }

        .success-icon-container {
            width: 100px;
            height: 100px;
            background-color: rgba(40, 167, 69, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 24px auto;
            color: #28a745;
        }

        .success-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #111111;
            margin-bottom: 12px;
        }

        .success-message {
            font-size: 0.95rem;
            color: #666666;
            line-height: 1.5;
            margin-bottom: 35px;
            padding: 0 15px;
        }

        .btn-primary {
            display: block;
            width: 100%;
            background-color: #0052cc;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(0, 82, 204, 0.2);
        }

        .btn-primary:hover {
            background-color: #003399;
        }

        .btn-primary:active {
            transform: scale(0.99);
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="brand-logo">GKAS</div>
        
        <div class="success-icon-container">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>

        <h1 class="success-title">Account Created!</h1>
        <p class="success-message">
            Your GKAS digital wallet account has been successfully registered. You can now log in to manage your balances and process fast transfers.
        </p>

        <a href="index.html" class="btn-primary">Proceed to Login</a>
    </div>

</body>
</html>

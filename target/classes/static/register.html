<!DOCTYPE html>
<html>
<head>
    <title>GKAS - Register</title>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #0052cc;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            width: 400px;
            padding: 30px;
            border-radius: 20px;
        }

        h1 {
            text-align: center;
            color: #0052cc;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #0052cc;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #0052cc;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>GKAS</h1>

    <h3>Create Account</h3>

    <label>Full Name</label>
    <input type="text" placeholder="Enter Full Name">

    <label>Mobile Number</label>
    <input type="text" placeholder="09XXXXXXXXX">

    <label>Password</label>
    <input type="password" placeholder="Enter Password">

    <label>Confirm Password</label>
    <input type="password" placeholder="Confirm Password">

    <button>Create Account</button>

    /

</div>

</body>
</html>

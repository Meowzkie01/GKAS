<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GKAS - Transaction Successful</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 0;
        }

        .success-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 420px;
            min-height: 90vh;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Success Animation Icon Badge */
        .success-badge {
            width: 80px;
            height: 80px;
            background-color: rgba(40, 167, 69, 0.1);
            color: #28a745;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .success-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #222;
            margin-bottom: 8px;
        }

        .success-subtitle {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 30px;
        }

        /* Receipt Breakdown Details Card */
        .receipt-card {
            background-color: #f8faff;
            border: 1px solid #e1e8f5;
            border-radius: 16px;
            width: 100%;
            padding: 20px;
            margin-bottom: 35px;
            text-align: left;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .receipt-row:last-child {
            margin-bottom: 0;
            padding-top: 12px;
            border-top: 1px dashed #ccc;
        }

        .receipt-label {
            color: #666;
            font-weight: 500;
        }

        .receipt-value {
            color: #222;
            font-weight: 600;
        }

        .receipt-value.amount {
            font-size: 1.3rem;
            font-weight: 800;
            color: #0052cc;
        }

        .btn-done {
            width: 100%;
            padding: 14px;
            background-color: #0052cc;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 12px rgba(0, 82, 204, 0.2);
            transition: background-color 0.2s;
        }

        .btn-done:hover {
            background-color: #0041a3;
        }
    </style>
</head>
<body>

    <div class="success-container">
        <div class="success-badge">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>

        <h1 class="success-title">Transaction Successful</h1>
        <p class="success-subtitle" id="tx-timestamp">Processing...</p>

        <div class="receipt-card">
            <div class="receipt-row">
                <span class="receipt-label">Service Type</span>
                <span class="receipt-value" id="receipt-type">---</span>
            </div>
            <div class="receipt-row">
                <span class="receipt-label">Sent To</span>
                <span class="receipt-value" id="receipt-target">---</span>
            </div>
            <div class="receipt-row">
                <span class="receipt-label">Reference No.</span>
                <span class="receipt-value" id="receipt-ref" style="font-family: monospace; font-size: 0.85rem;">---</span>
            </div>
            <div class="receipt-row">
                <span class="receipt-label">Amount Paid</span>
                <span class="receipt-value amount" id="receipt-amount">₱ 0.00</span>
            </div>
        </div>

        <button class="btn-done" onclick="exitToDashboard()">Back to Dashboard</button>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", () => {

        const userData = localStorage.getItem("gkasUser");

        if (!userData) {
            window.location.href = "index.html";
            return;
        }

        // Read URL parameters
        const params = new URLSearchParams(window.location.search);

        const type = params.get("type") || "Express Send";
        const target = params.get("target") || "Recipient";
        const amount = parseFloat(params.get("amount") || "0");

        const bank = params.get("bank");
        const account = params.get("account");

        // Generate receipt data
        const dateObj = new Date();

        const timeStr = dateObj.toLocaleTimeString("en-US", {
            hour: "numeric",
            minute: "2-digit",
            hour12: true
        });

        const dateStr = dateObj.toLocaleDateString("en-US", {
            month: "short",
            day: "numeric",
            year: "numeric"
        });

        const refNo =
            "REF" +
            Math.floor(10000000 + Math.random() * 90000000);

        document.getElementById("tx-timestamp").innerText =
            `${dateStr}, ${timeStr}`;

        document.getElementById("receipt-type").innerText =
            type;

        document.getElementById("receipt-ref").innerText =
            refNo;

        document.getElementById("receipt-amount").innerText =
            `₱ ${amount.toLocaleString("en-US", {
                minimumFractionDigits: 2
            })}`;

        // Handle different transaction types
        if (type === "Bank Transfer") {

            document.getElementById("receipt-target").innerHTML =
                `${target}<br><small>${bank} • ${account}</small>`;

        } else {

            document.getElementById("receipt-target").innerText =
                target;
        }

        /*
         IMPORTANT:
         Do NOT save balance here.
         Do NOT save history here.

         send.html and bank.html already did that.
         This page is DISPLAY ONLY.
        */
    });

    function exitToDashboard() {
        window.location.href = "dashboard.html";
    }
</script>
</body>
</html>
